<!DOCTYPE html>

<html>

<head>

<title>
SafeRoute Register
</title>

<link
rel="stylesheet"
href="/static/style.css"
>

</head>

<body>

<div class="auth-container">

<h1>
Register
</h1>

{% if error %}

<div class="error">

{{ error }}

</div>

{% endif %}

<form
method="POST"
action="/register"
>

<input
type="text"
name="fname"
placeholder="First Name"
required
>

<br><br>

<input
type="text"
name="lname"
placeholder="Last Name"
required
>

<br><br>

<input
type="text"
name="username"
placeholder="Username"
required
>

<br><br>

<input
type="password"
name="password"
placeholder="Password"
required
>

<br><br>

<select name="role">

<option value="student">

Student

</option>

<option value="admin">

Admin

</option>

</select>

<br><br>

<button type="submit">

Register

</button>

</form>

<br>

<a href="/login">

Already have an account?

</a>

</div>

</body>

</html>
