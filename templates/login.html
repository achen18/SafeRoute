<!DOCTYPE html>

<html>

<head>

<title>
SafeRoute Login
</title>

<link
rel="stylesheet"
href="/static/style.css"
>

</head>

<body>

<div class="auth-container">

<h1>
SafeRoute
</h1>

{% if error %}

<div class="error">

{{ error }}

</div>

{% endif %}

<form
method="POST"
action="/login"
>

<input
type="text"
name="username"
placeholder="Username"
required
>

<br><br>

<input
type="password"
name="password"
placeholder="Password"
required
>

<br><br>

<button type="submit">

Login

</button>

</form>

<br>

<a href="/register">

Create Account

</a>

</div>

</body>

</html>
